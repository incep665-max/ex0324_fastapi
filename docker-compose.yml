services:
  mysql80:
    image: mysql:8.0
    networks:
      - hi_net
    volumes:
      - ./db/conf.d:/etc/mysql/conf.d
      - ./db/data:/var/lib/mysql
      - ./db/initdb.d:/docker-entrypoint-initdb.d
    env_file: .env
    ports:
      - "3307:3306"
    restart: always
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hi_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: 
      - ./backend/app/.env
    networks:
      - hi_net
    depends_on:
      - mysql80
      - redis
    restart: always

networks:
  hi_net:
    driver: bridge